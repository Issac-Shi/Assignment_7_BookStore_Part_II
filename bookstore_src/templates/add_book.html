{% extends 'base.html' %}

{% block container %}
<main class="formPage">
    <section class="formCard">
        <h2>Add a New Book</h2>
        <p class="formIntro">
            Please enter complete book information. The image filename must exactly match a file
            inside <strong>static/images/books/</strong>, for example:
            <strong>boeing-787-dreamliner.jpg</strong>
        </p>

        <form method="POST" class="bookForm">
            <label for="title">Title</label>
            <input
                type="text"
                id="title"
                name="title"
                placeholder="e.g. Boeing 787 Dreamliner"
                required
            >

            <label for="author">Author</label>
            <input
                type="text"
                id="author"
                name="author"
                placeholder="e.g. Guy Norris, Mark Wagner"
                required
            >

            <label for="isbn">ISBN</label>
            <input
                type="text"
                id="isbn"
                name="isbn"
                placeholder="13-digit ISBN"
                minlength="10"
                maxlength="17"
                required
            >

            <label for="price">Price</label>
            <input
                type="number"
                id="price"
                name="price"
                step="0.01"
                min="0.01"
                placeholder="e.g. 24.99"
                required
            >

            <label for="image">Image filename</label>
            <input
                type="text"
                id="image"
                name="image"
                placeholder="must match a file in static/images/books/"
                required
            >
            <p class="fieldHint">
                Example: <code>airbus-a380.jpg</code> or <code>jet-age-comet-707.jpg</code>
            </p>

            <label for="categoryId">Category</label>
            <select id="categoryId" name="categoryId" required>
                {% for cat in categories %}
                    <option value="{{ cat.categoryId }}">{{ cat.categoryName }}</option>
                {% endfor %}
            </select>

            <div class="formButtons">
                <button type="submit" class="actionButton">Add Book</button>
                <a href="{{ url_for('home') }}" class="secondaryActionButton">Cancel</a>
            </div>
        </form>
    </section>
</main>
{% endblock %}
